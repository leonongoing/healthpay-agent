version: '3.8'

services:
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: healthpay-fhir
    ports:
      - "19911:8080"
    environment:
      - hapi.fhir.server_address=http://localhost:19911/fhir
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.allow_multiple_delete=true
      - hapi.fhir.allow_external_references=true
    volumes:
      - hapi-data:/data/hapi
    restart: unless-stopped

volumes:
  hapi-data:
